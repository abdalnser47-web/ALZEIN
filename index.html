<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ALZEIN Accounting</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#F59E0B',
            bgLight: '#F3F4F6',
            textDark: '#1E293B',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-bgLight text-textDark font-sans antialiased h-screen overflow-hidden flex flex-col">
  
  <!-- Header -->
  <header class="bg-white shadow-sm p-4 flex justify-between items-center sticky top-0 z-30">
    <button id="menuBtn" class="text-2xl text-textDark"><i class="fas fa-bars"></i></button>
    <h1 id="shopName" class="text-lg font-bold text-primary tracking-wide">ALZEIN SHOP</h1>
    <button id="langToggle" class="text-sm font-semibold border border-gray-300 rounded px-2 py-1">EN</button>
  </header>

  <!-- Side Drawer -->
  <aside id="drawer" class="fixed inset-y-0 left-0 w-64 bg-white shadow-xl transform -translate-x-full transition-transform duration-300 z-40 flex flex-col">
    <div class="p-4 border-b flex justify-between items-center bg-primary text-white">
      <span class="font-bold">Menu</span>
      <button id="closeDrawer" class="text-lg"><i class="fas fa-times"></i></button>
    </div>
    <nav class="flex-1 overflow-y-auto p-4 space-y-3">
      <button class="w-full text-left p-3 rounded hover:bg-gray-100 nav-link" data-target="dashboard"><i class="fas fa-home w-6"></i> <span data-i18n="home">Home</span></button>
      <button class="w-full text-left p-3 rounded hover:bg-gray-100 nav-link" data-target="transactions"><i class="fas fa-exchange-alt w-6"></i> <span data-i18n="transactions">Transactions</span></button>
      <button class="w-full text-left p-3 rounded hover:bg-gray-100 nav-link" data-target="vouchers"><i class="fas fa-file-invoice w-6"></i> <span data-i18n="vouchers">Vouchers</span></button>
      <button class="w-full text-left p-3 rounded hover:bg-gray-100 nav-link" data-target="currencies"><i class="fas fa-coins w-6"></i> <span data-i18n="currencies">Currencies</span></button>
      <button class="w-full text-left p-3 rounded hover:bg-gray-100 nav-link" data-target="reports"><i class="fas fa-chart-line w-6"></i> <span data-i18n="reports">Reports</span></button>
      <button class="w-full text-left p-3 rounded hover:bg-gray-100 nav-link" data-target="settings"><i class="fas fa-cog w-6"></i> <span data-i18n="settings">Settings</span></button>
    </nav>
    <div class="p-4 border-t bg-gray-50">
      <button id="exportBackup" class="w-full bg-primary text-white py-2 rounded mb-2"><i class="fas fa-download mr-2"></i> <span data-i18n="backup_json">Backup JSON</span></button>      <label class="w-full block text-center bg-gray-600 text-white py-2 rounded cursor-pointer">
        <span data-i18n="restore_json">Restore JSON</span>
        <input type="file" id="importBackup" accept=".json" class="hidden">
      </label>
    </div>
  </aside>

  <!-- Main Content -->
  <main id="app" class="flex-1 overflow-y-auto pb-20 px-4 py-4 relative">
    <!-- Sections will be toggled via JS -->
    <section id="dashboard" class="section space-y-4"></section>
    <section id="transactions" class="section hidden">
      <h2 class="text-xl font-bold mb-4" data-i18n="transactions">Transactions</h2>
      <div class="bg-white p-4 rounded shadow space-y-3">
        <input type="text" id="txSearch" placeholder="Search accounts..." class="w-full p-3 border rounded bg-gray-50">
        <div id="accountList" class="space-y-2"></div>
      </div>
    </section>
    <section id="vouchers" class="section hidden">
      <h2 class="text-xl font-bold mb-4" data-i18n="vouchers">Vouchers</h2>
      <div class="grid grid-cols-2 gap-4">
        <button id="receiptVoucher" class="p-6 bg-white rounded shadow text-center hover:bg-primary hover:text-white transition"><i class="fas fa-file-invoice-dollar text-3xl mb-2"></i><br>Receipt</button>
        <button id="paymentVoucher" class="p-6 bg-white rounded shadow text-center hover:bg-primary hover:text-white transition"><i class="fas fa-file-invoice text-3xl mb-2"></i><br>Payment</button>
      </div>
    </section>
    <section id="currencies" class="section hidden">
      <h2 class="text-xl font-bold mb-4" data-i18n="currencies">Currencies</h2>
      <div class="bg-white p-4 rounded shadow">
        <div class="flex gap-2 mb-3">
          <input id="newCurCode" placeholder="Code (USD)" class="flex-1 p-2 border rounded">
          <input id="newCurName" placeholder="Name" class="flex-1 p-2 border rounded">
          <input id="newCurRate" type="number" step="0.001" placeholder="Rate" class="w-20 p-2 border rounded">
          <button id="addCur" class="bg-primary text-white px-3 rounded"><i class="fas fa-plus"></i></button>
        </div>
        <div id="currencyList" class="space-y-2"></div>
      </div>
    </section>
    <section id="reports" class="section hidden">
      <div class="flex gap-2 mb-3">
        <select id="filterAccount" class="flex-1 p-2 border rounded"></select>
        <input type="date" id="filterStart" class="p-2 border rounded w-24">
        <input type="date" id="filterEnd" class="p-2 border rounded w-24">
        <button id="applyFilter" class="bg-primary text-white px-3 rounded">Filter</button>
      </div>
      <div class="bg-white rounded shadow overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-gray-100 border-b">
            <tr><th class="p-2 text-left" data-i18n="date">Date</th><th class="p-2" data-i18n="statement">Statement</th><th class="p-2" data-i18n="debit">Dr</th><th class="p-2" data-i18n="credit">Cr</th><th class="p-2" data-i18n="balance">Bal</th></tr>
          </thead>
          <tbody id="reportTable"></tbody>        </table>
      </div>
      <div class="flex gap-3 mt-4">
        <button id="exportPDF" class="flex-1 bg-red-600 text-white py-2 rounded"><i class="fas fa-file-pdf mr-2"></i> PDF</button>
        <button id="shareWA" class="flex-1 bg-green-600 text-white py-2 rounded"><i class="fab fa-whatsapp mr-2"></i> WhatsApp</button>
      </div>
    </section>
    <section id="settings" class="section hidden space-y-4">
      <h2 class="text-xl font-bold" data-i18n="settings">Settings</h2>
      <div class="bg-white p-4 rounded shadow space-y-4">
        <input id="setShopName" class="w-full p-2 border rounded" placeholder="Shop Name">
        <input id="setPhone" class="w-full p-2 border rounded" placeholder="Phone Number">
        <label class="block"><span class="text-sm">Logo URL / Path:</span><input id="setLogo" class="w-full p-2 border rounded"></label>
        <div class="grid grid-cols-2 gap-3">
          <input id="setLabelUs" class="p-2 border rounded" placeholder="Label: Us (لنا)">
          <input id="setLabelOnUs" class="p-2 border rounded" placeholder="Label: On Us (علينا)">
        </div>
        <select id="setDefaultCur" class="w-full p-2 border rounded"></select>
        <div class="space-y-2 border-t pt-3">
          <label class="flex items-center gap-2"><input type="checkbox" id="showTime"> Show Time</label>
          <label class="flex items-center gap-2"><input type="checkbox" id="showDate" checked> Show Date</label>
          <label class="flex items-center gap-2"><input type="checkbox" id="showPrevBal"> Show Prev Balance</label>
          <label class="flex items-center gap-2"><input type="checkbox" id="modeBusiness"> Business Mode</label>
        </div>
        <button id="saveSettings" class="w-full bg-primary text-white py-2 rounded">Save Settings</button>
      </div>
    </section>
  </main>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around items-center h-16 z-30 shadow-lg">
    <button class="nav-btn active" data-target="dashboard"><i class="fas fa-home text-xl"></i></button>
    <button class="nav-btn" data-target="reports"><i class="fas fa-chart-bar text-xl"></i></button>
    <button id="quickAddBtn" class="bg-primary text-white w-14 h-14 rounded-full flex items-center justify-center shadow-lg -mt-6 border-4 border-bgLight"><i class="fas fa-plus text-xl"></i></button>
    <button class="nav-btn" data-target="transactions"><i class="fas fa-exchange-alt text-xl"></i></button>
    <button class="nav-btn" data-target="settings"><i class="fas fa-cog text-xl"></i></button>
  </nav>

  <!-- Quick Add Modal -->
  <div id="quickModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
    <div class="bg-white w-full max-w-md p-6 rounded-lg shadow-xl relative">
      <button id="closeModal" class="absolute top-3 right-3 text-gray-500"><i class="fas fa-times"></i></button>
      <h3 class="text-lg font-bold mb-4" data-i18n="quick_entry">Quick Entry</h3>
      <form id="quickForm" class="space-y-3">
        <select id="qFrom" class="w-full p-2 border rounded"></select>
        <select id="qTo" class="w-full p-2 border rounded"></select>
        <input type="text" id="qAmount" placeholder="Amount (e.g., 100+50)" class="w-full p-2 border rounded font-mono">
        <input type="text" id="qNotes" placeholder="Notes / Voice" class="w-full p-2 border rounded relative">
        <button type="button" id="voiceBtn" class="absolute right-2 top-[115px] text-primary"><i class="fas fa-microphone"></i></button>
        <input type="file" id="qAttachment" accept="image/*" class="hidden">        <label class="block text-primary cursor-pointer border rounded p-2 text-center"><i class="fas fa-paperclip"></i> Attach Receipt</label>
        <button type="submit" class="w-full bg-primary text-white py-3 rounded font-bold mt-2">Save Transaction</button>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
